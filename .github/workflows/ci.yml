name: CI

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Check protected files
        run: |
          git fetch origin main
          changed_files="$(git diff --name-only origin/main...HEAD)"
          protected_pattern='^(backend/tests/acceptance/|backend/pytest\.ini$|\.github/workflows/ci\.yml$)'
          if echo "$changed_files" | grep -E "$protected_pattern"; then
            echo "Protected assessment files were modified."
            exit 1
          fi

      - name: PR1 scorecard
        working-directory: backend
        continue-on-error: true
        run: pytest -m pr1

      - name: PR2 scorecard
        working-directory: backend
        continue-on-error: true
        run: pytest -m pr2

