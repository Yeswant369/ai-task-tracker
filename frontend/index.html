<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Task Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1>Task Tracker</h1>
        <button id="theme-toggle" type="button" class="ghost" aria-pressed="false">
          Dark mode
        </button>
      </header>

      <p id="error" class="error" role="alert" hidden></p>

      <form id="new-task-form" class="new-task" autocomplete="off">
        <label class="sr-only" for="title">Task title</label>
        <input
          id="title"
          name="title"
          type="text"
          placeholder="What needs doing?"
          required
        />

        <label class="sr-only" for="new-priority">Priority</label>
        <select id="new-priority" name="priority">
          <option value="high">High</option>
          <option value="medium" selected>Medium</option>
          <option value="low">Low</option>
        </select>

        <button type="submit">Add</button>
      </form>

      <div class="controls">
        <label for="filter">Show</label>
        <select id="filter">
          <option value="all" selected>All priorities</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>

        <label class="checkbox">
          <input id="sort" type="checkbox" />
          Sort by priority
        </label>
      </div>

      <ul id="task-list" class="task-list"></ul>

      <p id="empty" class="empty" hidden></p>

      <p id="status-bar" class="status-bar" aria-live="polite"></p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
